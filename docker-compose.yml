version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gymbook-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-GymBook_DB}
      POSTGRES_USER: ${POSTGRES_USER:-tfg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tfg_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - tfg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tfg_user} -d ${POSTGRES_DB:-GymBook_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  tfg-network:
    driver: bridge
