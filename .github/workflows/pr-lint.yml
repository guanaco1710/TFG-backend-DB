name: PR Lint

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  pr-title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types: feat, fix, docs, style, refactor, test, chore, perf, ci, build, revert
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

  no-fixup-commits:
    name: Disallow fixup! / squash! commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for fixup commits
        run: |
          git log origin/main..HEAD --oneline | grep -iE "^[a-f0-9]+ (fixup!|squash!)" && {
            echo "ERROR: fixup!/squash! commits must be squashed before merging."
            exit 1
          } || echo "No fixup/squash commits found."
