spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/GymBook_DB
    username: ${DB_USERNAME:tfg_user}
    password: ${DB_PASSWORD:tfg_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
